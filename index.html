<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Representation Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted theme before React mounts to avoid a
      // flash-of-wrong-theme. Mirrors the logic in useTheme.ts —
      // keep the two in sync if you add more themes.
      (function () {
        try {
          var stored = localStorage.getItem("ui-theme");
          var prefersLight =
            stored == null &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : prefersLight
              ? "light"
              : "dark";
          if (theme === "light") document.documentElement.classList.add("theme-light");
          document.documentElement.style.colorScheme = theme;
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
